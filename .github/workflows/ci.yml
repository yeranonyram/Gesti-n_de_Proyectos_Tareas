name: Backend CI/CD Pipeline

on:
  push:
    branches: ["backend", "main"]
  pull_request:
    branches: ["main"]

jobs:
  # JOB 1: Pruebas y Build
  build-and-test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x] # Usamos la misma versión que en Render

    steps:
      # 1. Descargar el código
      - name: Chekout del codigo
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name:  Configurar Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with: 
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json  # Importante: está dentro de backend
               
      # 3. Instalar dependencias
      - name: Instalar dependencias
        run: npm install --legacy-peer-deps
        working-directory: ./backend
      
      # 4. Ejecutar Linter
      - name: Ejecutar Linter (ESLint)
        run: npm run lint
        working-directory: ./backend

      # 5. Ejecutar Pruebas Unitarias
      - name: 🧪 Ejecutar Pruebas (Jest)
        run: npm run test
        working-directory: ./backend
        env:
          # Variables de entorno necesarias para que las pruebas no fallen
          # (aunque uses mocks, si algún servicio las pide, las ponemos)
          NODE_ENV: test
          JWT_SECRET: test_secret_1234
      
      # 6. Construir el proyecto (genera dist/)
      - name: Construir proyecto
        run: npm run build
        working-directory: ./backend


# JOB 2: Validar el Dockerfile 

  docker-validate:
    runs-on: ubuntu-latest
    needs: build-and-test  # Solo corre si las pruebas pasan
    if: github.ref == 'refs/heads/main'  # Solo en la rama main (producción)

    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validar build de Docker (sin subir a registry) 
        uses: docker/build-push-action@v5
        with:
          context: ./backend  # El Dockerfile está dentro de backend
          file: ./backend/Dockerfile
          push: false         # Solo construye para validar que no hay errores
          tags: app-validation:latest
          load: true
      - name: ✅ Log de éxito del build de Docker
        run: echo "🎉 El Dockerfile construye correctamente!"












